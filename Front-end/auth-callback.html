<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logging in...</title>
    <link rel="stylesheet" href="./Services/notifications.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #003b62 0%, #0099ff 100%);
            font-family: 'Inter', sans-serif;
        }
        .loading-container {
            text-align: center;
            color: white;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 {
            margin: 0;
            font-size: 24px;
        }
        p {
            margin: 10px 0 0;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="spinner"></div>
        <h2>Logging you in...</h2>
        <p>Please wait a moment</p>
    </div>

    <script src="./Services/env-config.js"></script>
    <script src="./Services/notifications.js"></script>
    <script>
        async function getApiBaseUrl() {
            await window.ENV_CONFIG.load();
            return window.ENV_CONFIG.getApiBaseUrl();
        }

        function getTokenFromUrl() {
            const query = new URLSearchParams(window.location.search);
            const hash = new URLSearchParams(window.location.hash.replace(/^#/, ''));

            return (
                query.get('token') ||
                query.get('access_token') ||
                hash.get('token') ||
                hash.get('access_token') ||
                ''
            );
        }

        (async function () {
            const BACKEND_URL = await getApiBaseUrl();
            const token = getTokenFromUrl();

            if (token) {
                localStorage.setItem('token', token);

                setTimeout(() => {
                    window.location.href = '/pages/course-informations/course-informations.html';
                }, 700);
            } else {
                if (typeof showNotification === 'function') {
                    showNotification('Authentication failed. Please try again.', 'error');
                }

                console.warn('OAuth callback returned without token from:', BACKEND_URL);

                setTimeout(() => {
                    window.location.href = '/pages/login/login.html';
                }, 1200);
            }
        })();
    </script>
</body>
</html>
