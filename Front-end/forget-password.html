<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forget Password</title>
    <link rel="stylesheet" href="forget-password.css">
    <link rel="stylesheet" href="notifications.css">
</head>
<body>
    <a href="index.html"><p class = "home"> < home</p></a>
    <div class="everything">
        <div class="circle1"></div>
        <div class="circle2"></div>
        <p class = "header">Reset Your Password</p>
        <p class = "sub-header">We'll send a password reset link to your email address</p>
        
        <!-- Email Input Form (Initially visible) -->
        <form id="forgot-password-form" novalidate>
            <div class="email-input">
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            <button type="submit" class="send-button">Send Reset Link</button>
        </form>

        <!-- Success Message (Hidden initially, shown after sending) -->
        <div class="didnt-get" id="success-message" style="display: none;">
            <p>Didn't get the link?</p>
            <button class="resend-button" id="resend-button">Send Again</button>
        </div>

        <p class = "remember-password">Remember password? <a href="login.html"><span>Log in</span></a></p>
    </div>

    <script src="notifications.js"></script>
    <script>
        // ============================================
        // BACKEND URL - CHANGE THIS WHEN YOU GET IT
        // ============================================
        const BACKEND_URL = 'https://smail-app-production.up.railway.app'; // ← PUT YOUR BACKEND URL HERE

        let userEmail = ''; // Store email for resend functionality

        // Handle form submission
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('forgot-password-form');
            const successMessage = document.getElementById('success-message');
            const resendButton = document.getElementById('resend-button');
            
            if (!form) {
                console.error('Forgot password form not found!');
                return;
            }

            console.log('Forgot password form loaded successfully!');

            // Handle initial form submission
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                await sendResetLink(form);
            });

            // Handle resend button click
            resendButton.addEventListener('click', async function() {
                if (userEmail) {
                    await sendResetLink(null, userEmail);
                }
            });

            // Function to send reset link
            async function sendResetLink(formElement, email = null) {
                // Get email from form or use stored email
                if (!email) {
                    email = document.querySelector('input[name="email"]').value.trim();
                }

                // Validation
                if (!email) {
                    showNotification('Please enter your email address!', 'error');
                    return;
                }

                // Validate email format
                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailPattern.test(email)) {
                    showNotification('Please enter a valid email address!', 'error');
                    return;
                }

                // Store email for resend
                userEmail = email;

                // Show loading state
                const submitBtn = formElement ? 
                    formElement.querySelector('button[type="submit"]') : 
                    resendButton;
                const originalText = submitBtn.textContent;
                submitBtn.textContent = 'Sending...';
                submitBtn.disabled = true;

                try {
                    console.log('Sending password reset request...');
                    
                    // Send request to backend
                    const response = await fetch(`${BACKEND_URL}/api/auth/forgot-password`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            email: email
                        })
                    });

                    const data = await response.json();
                    console.log('Response:', data);

                    if (!response.ok) {
                        throw new Error(data.message || 'Failed to send reset link');
                    }

                    // SUCCESS!
                    console.log('Reset link sent successfully!');
                    
                    // Hide form, show success message
                    if (formElement) {
                        formElement.style.display = 'none';
                    }
                    successMessage.style.display = 'block';

                    // Show success alert
                    showNotification('If this email exists, a password reset link has been sent. Please check your inbox and spam folder.', 'success');

                    // Reset resend button
                    resendButton.textContent = 'Send Again';
                    resendButton.disabled = false;

                } catch (error) {
                    // Handle errors
                    console.error('Forgot password error:', error);
                    showNotification(error.message || 'Failed to send reset link. Please try again.', 'error');
                    
                    // Reset button
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;
                }
            }
        });
    </script>
</body>
</html>
