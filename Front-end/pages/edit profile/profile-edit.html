<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="profile-edit.css">
</head>
<body>
    <div class="circle1"></div>
    <div class="circle2"></div>

    <!-- Picture Upload Modal -->
    <div class="modal" id="picture-modal">
        <div class="modal-content">
            <span class="close" data-modal="picture-modal">&times;</span>
            <h2>Update Profile Picture</h2>
            <form id="picture-form">
                <div class="picture-preview">
                    <img src="../../image/landing-page-pictures/ismail hamani profile picture.jpeg" id="preview-img" alt="Preview">
                </div>
                <div class="picture-controls">
                    <label for="picture-upload" class="upload-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 15.5V3.5M12 3.5L7 8.5M12 3.5L17 8.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M3 15.5V18.5C3 19.6046 3.89543 20.5 5 20.5H19C20.1046 20.5 21 19.6046 21 18.5V15.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        Choose Picture
                    </label>
                    <input type="file" id="picture-upload" accept="image/*" style="display: none;">
                    
                    <div class="zoom-control">
                        <label>Zoom:</label>
                        <input type="range" id="zoom-slider" min="1" max="2" step="0.1" value="1">
                    </div>
                </div>
                <div class="form-buttons">
                    <button type="button" class="remove-btn" id="remove-picture">Remove Picture</button>
                    <button type="submit" class="save-btn">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Username Change Modal -->
    <div class="modal" id="username-modal">
        <div class="modal-content">
            <span class="close" data-modal="username-modal">&times;</span>
            <h2>Change Username</h2>
            <form id="username-form">
                <div class="form-group">
                    <label>New Username</label>
                    <input type="text" name="newUsername" placeholder="Enter new username" required>
                </div>
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                    <a href="../forget-password/forget-password.html" class="forgot-link">Forgot password?</a>
                </div>
                <div class="form-buttons">
                    <button type="button" class="cancel-btn" data-modal="username-modal">Cancel</button>
                    <button type="submit" class="save-btn">Update Username</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://smail-app-production.up.railway.app';

        // Load user data on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadUserData();
            setupModalHandlers();
            setupFormHandlers();
            setupPasswordToggles();
        });

        // Load user data from localStorage
        function loadUserData() {
            const userData = localStorage.getItem('userData');
            if (userData) {
                try {
                    const user = JSON.parse(userData);
                    if (user.username) {
                        document.getElementById('display-username').textContent = user.username;
                        document.getElementById('username-display').textContent = user.username;
                    }
                    if (user.email) {
                        document.getElementById('email-display').textContent = user.email;
                    }
                } catch (error) {
                    console.error('Error loading user data:', error);
                }
            }
        }

        // Modal handlers
        function setupModalHandlers() {
            // Open modals
            document.querySelectorAll('.edit[data-modal]').forEach(btn => {
                btn.addEventListener('click', function() {
                    const modalId = this.getAttribute('data-modal');
                    document.getElementById(modalId).style.display = 'flex';
                });
            });

            // Close modals
            document.querySelectorAll('.close, .cancel-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const modalId = this.getAttribute('data-modal');
                    document.getElementById(modalId).style.display = 'none';
                });
            });

            // Click outside to close
            window.addEventListener('click', function(e) {
                if (e.target.classList.contains('modal')) {
                    e.target.style.display = 'none';
                }
            });
        }

        // Picture upload handling
        const pictureUpload = document.getElementById('picture-upload');
        const previewImg = document.getElementById('preview-img');
        const zoomSlider = document.getElementById('zoom-slider');
        let uploadedFile = null;

        pictureUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                uploadedFile = file;
                const reader = new FileReader();
                reader.onload = function(event) {
                    previewImg.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        zoomSlider.addEventListener('input', function() {
            previewImg.style.transform = `scale(${this.value})`;
        });

        document.getElementById('remove-picture').addEventListener('click', function() {
            if (confirm('Are you sure you want to remove your profile picture?')) {
                // Reset to default
                previewImg.src = '../../image/landing-page-pictures/ismail hamani profile picture.jpeg';
                document.getElementById('main-profile-pic').src = '../../image/landing-page-pictures/ismail hamani profile picture.jpeg';
                uploadedFile = null;
                alert('Profile picture removed!');
                document.getElementById('picture-modal').style.display = 'none';
            }
        });

        // Form handlers
        function setupFormHandlers() {
            // Picture form
            document.getElementById('picture-form').addEventListener('submit', async function(e) {
                e.preventDefault();
                if (uploadedFile) {
                    // Update main profile picture
                    document.getElementById('main-profile-pic').src = previewImg.src;
                    alert('Profile picture updated successfully!');
                    document.getElementById('picture-modal').style.display = 'none';
                } else {
                    alert('Please choose a picture first!');
                }
            });

            // Username form
            document.getElementById('username-form').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const newUsername = document.querySelector('input[name="newUsername"]').value.trim();
                const password = document.querySelector('input[name="password"]').value;
                const token = localStorage.getItem('token');

                if (!token) {
                    alert('Please log in first!');
                    window.location.href = '../login/login.html';
                    return;
                }

                try {
                    const response = await fetch(`${BACKEND_URL}/api/username_route`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            username: newUsername,
                            password: password
                        })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.message || 'Failed to update username');
                    }

                    // Update display
                    document.getElementById('display-username').textContent = newUsername;
                    document.getElementById('username-display').textContent = newUsername;

                    // Update localStorage
                    const userData = JSON.parse(localStorage.getItem('userData') || '{}');
                    userData.username = newUsername;
                    localStorage.setItem('userData', JSON.stringify(userData));

                    alert('Username updated successfully!');
                    document.getElementById('username-modal').style.display = 'none';
                    this.reset();

                } catch (error) {
                    console.error('Error:', error);
                    alert(error.message || 'Failed to update username');
                }
            });

            // Password form
            document.getElementById('password-form').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const currentPassword = document.querySelector('input[name="currentPassword"]').value;
                const newPassword = document.querySelector('input[name="newPassword"]').value;
                const confirmPassword = document.querySelector('input[name="confirmPassword"]').value;
                const token = localStorage.getItem('token');

                if (!token) {
                    alert('Please log in first!');
                    window.location.href = '../login/login.html';
                    return;
                }

                if (newPassword !== confirmPassword) {
                    alert('New passwords do not match!');
                    return;
                }

                if (newPassword.length < 8) {
                    alert('Password must be at least 8 characters!');
                    return;
                }

                try {
                    // Call backend password change endpoint (you'll need to add this route)
                    const response = await fetch(`${BACKEND_URL}/api/change-password`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            currentPassword: currentPassword,
                            newPassword: newPassword
                        })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.message || 'Failed to update password');
                    }

                    alert('Password updated successfully!');
                    document.getElementById('password-modal').style.display = 'none';
                    this.reset();

                } catch (error) {
                    console.error('Error:', error);
                    alert(error.message || 'Failed to update password');
                }
            });
        }

        // Password toggle
        function setupPasswordToggles() {
            document.querySelectorAll('.toggle-password').forEach(button => {
                button.addEventListener('click', function() {
                    const targetName = this.getAttribute('data-target');
                    const input = document.querySelector(`input[name="${targetName}"]`);
                    
                    if (input) {
                        const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                        input.setAttribute('type', type);
                        
                        this.innerHTML = '';
                        
                        if (type === 'text') {
