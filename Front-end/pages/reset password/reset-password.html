<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="reset password.css">
    <link rel="stylesheet" href="../../Services/notifications.css">
</head>
<body>
    <a href="../landing page/index.html"><p class = "home"> < home</p></a>
    <div class="everything">
        <div class="circle1"></div>
        <div class="circle2"></div>
        <p class = "header">Create New Password</p>
        <p class = "sub-header">Your new password must be different from previously used passwords</p>
        <form id="reset-password-form" novalidate>
            <div class="password-input">
                <input type="password" name="newPassword" placeholder="New Password" minlength="8" required>
                <div class="toggle-password" data-target="newPassword" style="cursor: pointer;">
                    <svg class="no-eye" width="21" height="18" viewBox="0 0 21 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10.5383 4.44354C7.71796 4.46175 6.14917 6.08996 6.14917 8.85667C6.14917 11.6234 7.71892 13.2353 10.5441 13.2516C13.3635 13.2343 14.8805 11.7144 14.9333 8.83942C14.8844 6.02383 13.3261 4.46175 10.5383 4.44354ZM10.5441 12.2933C8.24505 12.2798 7.15254 11.1845 7.1075 8.84708C7.15159 6.51067 8.24409 5.41529 10.5383 5.40092C12.7799 5.41625 13.9356 6.57775 13.9749 8.8375C13.9328 11.1806 12.8403 12.2798 10.5441 12.2933Z" fill="#73808B"/>
                        <path d="M21.0637 8.80108C19.4978 3.41717 15.8628 0.546958 10.5508 0.5H10.5421C5.11127 0.545042 1.57023 3.31942 0.0186875 8.74454C-0.00622917 8.83079 -0.00622917 8.92183 0.0186875 9.00712C1.55298 14.3987 5.09402 17.1539 10.5508 17.1961C15.9951 17.1539 19.5323 14.4179 21.0646 9.06654C21.0896 8.97933 21.0896 8.88733 21.0646 8.80108H21.0637ZM10.5498 16.2377C5.55115 16.1985 2.41835 13.7911 0.977021 8.87679C2.4174 3.996 5.63644 1.5005 10.546 1.45833C15.4153 1.50242 18.6295 4.01708 20.1034 8.93525C18.664 13.8093 15.536 16.1985 10.5498 16.2377Z" fill="#73808B"/>
                        <path d="M2 17.5L19 0.5" stroke="#73808B" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>
            <div class="password-input">
                <input type="password" name="confirmPassword" placeholder="Confirm New Password" minlength="8" required>
                <div class="toggle-password" data-target="confirmPassword" style="cursor: pointer;">
                    <svg class="no-eye" width="21" height="18" viewBox="0 0 21 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10.5383 4.44354C7.71796 4.46175 6.14917 6.08996 6.14917 8.85667C6.14917 11.6234 7.71892 13.2353 10.5441 13.2516C13.3635 13.2343 14.8805 11.7144 14.9333 8.83942C14.8844 6.02383 13.3261 4.46175 10.5383 4.44354ZM10.5441 12.2933C8.24505 12.2798 7.15254 11.1845 7.1075 8.84708C7.15159 6.51067 8.24409 5.41529 10.5383 5.40092C12.7799 5.41625 13.9356 6.57775 13.9749 8.8375C13.9328 11.1806 12.8403 12.2798 10.5441 12.2933Z" fill="#73808B"/>
                        <path d="M21.0637 8.80108C19.4978 3.41717 15.8628 0.546958 10.5508 0.5H10.5421C5.11127 0.545042 1.57023 3.31942 0.0186875 8.74454C-0.00622917 8.83079 -0.00622917 8.92183 0.0186875 9.00712C1.55298 14.3987 5.09402 17.1539 10.5508 17.1961C15.9951 17.1539 19.5323 14.4179 21.0646 9.06654C21.0896 8.97933 21.0896 8.88733 21.0646 8.80108H21.0637ZM10.5498 16.2377C5.55115 16.1985 2.41835 13.7911 0.977021 8.87679C2.4174 3.996 5.63644 1.5005 10.546 1.45833C15.4153 1.50242 18.6295 4.01708 20.1034 8.93525C18.664 13.8093 15.536 16.1985 10.5498 16.2377Z" fill="#73808B"/>
                        <path d="M2 17.5L19 0.5" stroke="#73808B" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>
            <input id="reset" type="submit" value="Reset Password">
        </form>
    </div>

    <script src="../../Services/env-config.js"></script>
    <script src="../../Services/notifications.js"></script>
    <script>
        // Handle form submission
        document.addEventListener('DOMContentLoaded', async function() {
            await window.ENV_CONFIG.load();
            const BACKEND_URL = window.ENV_CONFIG.requireApiBaseUrl();
            const form = document.getElementById('reset-password-form');
            
            if (!form) {
                console.error('Reset password form not found!');
                return;
            }

            console.log('Reset password form loaded successfully!');

            // Password visibility toggle logic
            const toggleButtons = document.querySelectorAll('.toggle-password');
            toggleButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const targetName = this.getAttribute('data-target');
                    const input = document.querySelector(`input[name="${targetName}"]`);
                    
                    if (input) {
                        const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                        input.setAttribute('type', type);
                        
                        // Clear current content
                        this.innerHTML = '';
                        
                        if (type === 'text') {
                            // User's provided "eye" SVG
                            this.innerHTML = `
                                <svg class="no-eye" xmlns="http://www.w3.org/2000/svg" id="Layer_1" data-name="Layer 1" viewBox="0 0 24 24" width="21" height="18" fill="none">
                                    <path d="M11.997,7.404c-2.943,.019-4.58,1.718-4.58,4.605s1.638,4.569,4.586,4.586c2.942-.018,4.525-1.604,4.58-4.604-.051-2.938-1.677-4.568-4.586-4.587Zm.006,8.191c-2.399-.014-3.539-1.157-3.586-3.596,.046-2.438,1.186-3.581,3.58-3.596,2.339,.016,3.545,1.228,3.586,3.586-.044,2.445-1.184,3.591-3.58,3.605Z" fill="#73808B"/>
                                    <path d="M22.98,11.951c-1.634-5.618-5.427-8.613-10.97-8.662h-.009c-5.667,.047-9.362,2.942-10.981,8.603-.026,.09-.026,.185,0,.274,1.601,5.626,5.296,8.501,10.99,8.545,5.681-.044,9.372-2.899,10.971-8.483,.026-.091,.026-.187,0-.277Zm-10.971,7.76c-5.216-.041-8.485-2.553-9.989-7.681,1.503-5.093,4.862-7.697,9.985-7.741,5.081,.046,8.435,2.67,9.973,7.802-1.502,5.086-4.767,7.579-9.97,7.62Z" fill="#73808B"/>
                                </svg>
                            `;
                        } else {
                            // Original "no-eye" SVG
                            this.innerHTML = `
                                <svg class="no-eye" width="21" height="18" viewBox="0 0 21 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M10.5383 4.44354C7.71796 4.46175 6.14917 6.08996 6.14917 8.85667C6.14917 11.6234 7.71892 13.2353 10.5441 13.2516C13.3635 13.2343 14.8805 11.7144 14.9333 8.83942C14.8844 6.02383 13.3261 4.46175 10.5383 4.44354ZM10.5441 12.2933C8.24505 12.2798 7.15254 11.1845 7.1075 8.84708C7.15159 6.51067 8.24409 5.41529 10.5383 5.40092C12.7799 5.41625 13.9356 6.57775 13.9749 8.8375C13.9328 11.1806 12.8403 12.2798 10.5441 12.2933Z" fill="#73808B"/>
                                    <path d="M21.0637 8.80108C19.4978 3.41717 15.8628 0.546958 10.5508 0.5H10.5421C5.11127 0.545042 1.57023 3.31942 0.0186875 8.74454C-0.00622917 8.83079 -0.00622917 8.92183 0.0186875 9.00712C1.55298 14.3987 5.09402 17.1539 10.5508 17.1961C15.9951 17.1539 19.5323 14.4179 21.0646 9.06654C21.0896 8.97933 21.0896 8.88733 21.0646 8.80108H21.0637ZM10.5498 16.2377C5.55115 16.1985 2.41835 13.7911 0.977021 8.87679C2.4174 3.996 5.63644 1.5005 10.546 1.45833C15.4153 1.50242 18.6295 4.01708 20.1034 8.93525C18.664 13.8093 15.536 16.1985 10.5498 16.2377Z" fill="#73808B"/>
                                    <path d="M2 17.5L19 0.5" stroke="#73808B" stroke-linecap="round"/>
                                </svg>
                            `;
                        }
                    }
                });
            });

            // Get token from URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            console.log('Token from URL:', token);

            // Check if token exists
            if (!token) {
                showNotification('Invalid or missing reset token. Please request a new password reset link.', 'error');
                setTimeout(() => {
                    window.location.href = '../forget-password/forget-password.html';
                }, 2000);
                return;
            }

            // Handle form submission
            form.addEventListener('submit', async function(e) {
                e.preventDefault(); // Prevent page reload

                // Get form values
                const newPassword = document.querySelector('input[name="newPassword"]').value;
                const confirmPassword = document.querySelector('input[name="confirmPassword"]').value;

                // Validation
                if (!newPassword || !confirmPassword) {
                    showNotification('All fields are required!', 'error');
                    return;
                }

                if (newPassword.length < 8) {
                    showNotification('Password must be at least 8 characters long!', 'error');
                    return;
                }

                if (newPassword !== confirmPassword) {
                    showNotification('Passwords do not match!', 'error');
                    return;
                }

                // Show loading state
                const submitBtn = document.getElementById('reset');
                const originalValue = submitBtn.value;
                submitBtn.value = 'Resetting...';
                submitBtn.disabled = true;

                try {
                    console.log('Sending password reset request...');
                    
                    // Send request to backend
                    const response = await fetch(`${BACKEND_URL}/api/auth/reset-password`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            token: token,
                            newPassword: newPassword
                        })
                    });

                    const data = await response.json();
                    console.log('Response:', data);

                    if (!response.ok) {
                        // Handle specific error messages
                        if (data.message === "Token invalide ou expiré.") {
                            throw new Error('Reset link has expired or is invalid. Please request a new one.');
                        }
                        throw new Error(data.message || 'Password reset failed');
                    }

                    // SUCCESS!
                    console.log('Password reset successful!');
                    showNotification('Password reset successful! Redirecting to login...', 'success');
                    
                    // Redirect to login page after 1 second
                    setTimeout(() => {
                        window.location.href = '../login/login.html';
                    }, 1000);

                } catch (error) {
                    // Handle errors
                    console.error('Password reset error:', error);
                    showNotification(error.message || 'Failed to reset password. Please try again.', 'error');
                    
                    // If token is expired, redirect to forgot password page
                    if (error.message.includes('expired') || error.message.includes('invalid')) {
                        setTimeout(() => {
                            window.location.href = '../forget-password/forget-password.html';
                        }, 2000);
                    }
                    
                    // Reset button
                    submitBtn.value = originalValue;
                    submitBtn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
