<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in , Welcome back</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="../../Services/notifications.css">
</head>

<body>
    <div class="circle1"></div>
    <div class="circle2"></div>
    <div class="all-the-work">
        <a href="../landing page/index.html">
            <p class="home">
                < home</p>
        </a>
        <div class="sign-up">
            <div class="left">
                <p class="heading">Welcome Back!</p>
                <p class="sub-heading">Log in to Your Account</p>

                <form id="login-form" novalidate>
                    <!-- Google Sign-In Button -->
                    <a href="#" class="google-signin">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                            <path fill="#EA4335"
                                d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                            <path fill="#4285F4"
                                d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                            <path fill="#FBBC05"
                                d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                            <path fill="#34A853"
                                d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                            <path fill="none" d="M0 0h48v48H0z" />
                        </svg>
                        Continue with Google
                    </a>

                    <!-- OR Divider -->
                    <div class="or-divider">
                        <span>OR</span>
                    </div>

                    <div class="phone-number-input">
                        <input type="email" class="phone" name="email" placeholder="Email" required>
                        <?xml version="1.0" encoding="UTF-8"?>
                        <svg class="input-svg" xmlns="http://www.w3.org/2000/svg" id="Layer_1" data-name="Layer 1"
                            viewBox="0 0 24 24" width="512" height="512">
                            <path
                                d="M19,1H5A5.006,5.006,0,0,0,0,6V18a5.006,5.006,0,0,0,5,5H19a5.006,5.006,0,0,0,5-5V6A5.006,5.006,0,0,0,19,1ZM5,3H19a3,3,0,0,1,2.78,1.887l-7.658,7.659a3.007,3.007,0,0,1-4.244,0L2.22,4.887A3,3,0,0,1,5,3ZM19,21H5a3,3,0,0,1-3-3V7.5L8.464,13.96a5.007,5.007,0,0,0,7.072,0L22,7.5V18A3,3,0,0,1,19,21Z" />
                        </svg>
                    </div>
                    <div class="password-input">
                        <input type="password" class="password" name="password" placeholder="Password" minlength="8"
                            required>
                        <div class="toggle-password" style="cursor: pointer;">
                            <svg class="no-eye" width="21" height="18" viewBox="0 0 21 18" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M10.5383 4.44354C7.71796 4.46175 6.14917 6.08996 6.14917 8.85667C6.14917 11.6234 7.71892 13.2353 10.5441 13.2516C13.3635 13.2343 14.8805 11.7144 14.9333 8.83942C14.8844 6.02383 13.3261 4.46175 10.5383 4.44354ZM10.5441 12.2933C8.24505 12.2798 7.15254 11.1845 7.1075 8.84708C7.15159 6.51067 8.24409 5.41529 10.5383 5.40092C12.7799 5.41625 13.9356 6.57775 13.9749 8.8375C13.9328 11.1806 12.8403 12.2798 10.5441 12.2933Z"
                                    fill="#73808B" />
                                <path
                                    d="M21.0637 8.80108C19.4978 3.41717 15.8628 0.546958 10.5508 0.5H10.5421C5.11127 0.545042 1.57023 3.31942 0.0186875 8.74454C-0.00622917 8.83079 -0.00622917 8.92183 0.0186875 9.00712C1.55298 14.3987 5.09402 17.1539 10.5508 17.1961C15.9951 17.1539 19.5323 14.4179 21.0646 9.06654C21.0896 8.97933 21.0896 8.88733 21.0646 8.80108H21.0637ZM10.5498 16.2377C5.55115 16.1985 2.41835 13.7911 0.977021 8.87679C2.4174 3.996 5.63644 1.5005 10.546 1.45833C15.4153 1.50242 18.6295 4.01708 20.1034 8.93525C18.664 13.8093 15.536 16.1985 10.5498 16.2377Z"
                                    fill="#73808B" />
                                <path d="M2 17.5L19 0.5" stroke="#73808B" stroke-linecap="round" />
                            </svg>
                        </div>
                    </div>
                    <p class="forget-password"><a class="forget-link" href="../forget-password/forget-password.html">forget password ?</a>
                    </p>
                    <input type="submit" value="Log in" class="sign-up-button">
                </form>
                <p class="already-have-an-account">Don't have an account? <a href="../sign up/sign up.html"><span>Sign
                            up</span></a></p>
            </div>
            <div class="right">
                <p class="comment">Welcome back! Continue your learning journey</p>
            </div>
        </div>
    </div>

    <script src="../../Services/env-config.js"></script>
    <script src="../../Services/notifications.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            await window.ENV_CONFIG.load();
            const BACKEND_URL = window.ENV_CONFIG.getApiBaseUrl();
            const form = document.getElementById('login-form');
            const googleSignin = document.querySelector('.google-signin');

            if (googleSignin) {
                googleSignin.href = `${BACKEND_URL}/api/auth/google`;
            }

            if (!form) {
                console.error('Login form not found!');
                return;
            }

            console.log('Login form loaded successfully!');

            // Password visibility toggle
            const togglePassword = document.querySelector('.toggle-password');
            const passwordInput = document.querySelector('input[name="password"]');

            if (togglePassword && passwordInput) {
                togglePassword.addEventListener('click', function () {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);

                    this.innerHTML = '';

                    if (type === 'text') {
                        this.innerHTML = `
                            <svg class="no-eye" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="21" height="18">
                                <path d="M11.997,7.404c-2.943,.019-4.58,1.718-4.58,4.605s1.638,4.569,4.586,4.586c2.942-.018,4.525-1.604,4.58-4.604-.051-2.938-1.677-4.568-4.586-4.587Zm.006,8.191c-2.399-.014-3.539-1.157-3.586-3.596,.046-2.438,1.186-3.581,3.58-3.596,2.339,.016,3.545,1.228,3.586,3.586-.044,2.445-1.184,3.591-3.58,3.605Z" fill="#73808B"/>
                                <path d="M22.98,11.951c-1.634-5.618-5.427-8.613-10.97-8.662h-.009c-5.667,.047-9.362,2.942-10.981,8.603-.026,.09-.026,.185,0,.274,1.601,5.626,5.296,8.501,10.99,8.545,5.681-.044,9.372-2.899,10.971-8.483,.026-.091,.026-.187,0-.277Zm-10.971,7.76c-5.216-.041-8.485-2.553-9.989-7.681,1.503-5.093,4.862-7.697,9.985-7.741,5.081,.046,8.435,2.67,9.973,7.802-1.502,5.086-4.767,7.579-9.97,7.62Z" fill="#73808B"/>
                            </svg>
                        `;
                    } else {
                        this.innerHTML = `
                            <svg class="no-eye" width="21" height="18" viewBox="0 0 21 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M10.5383 4.44354C7.71796 4.46175 6.14917 6.08996 6.14917 8.85667C6.14917 11.6234 7.71892 13.2353 10.5441 13.2516C13.3635 13.2343 14.8805 11.7144 14.9333 8.83942C14.8844 6.02383 13.3261 4.46175 10.5383 4.44354ZM10.5441 12.2933C8.24505 12.2798 7.15254 11.1845 7.1075 8.84708C7.15159 6.51067 8.24409 5.41529 10.5383 5.40092C12.7799 5.41625 13.9356 6.57775 13.9749 8.8375C13.9328 11.1806 12.8403 12.2798 10.5441 12.2933Z" fill="#73808B"/>
                                <path d="M21.0637 8.80108C19.4978 3.41717 15.8628 0.546958 10.5508 0.5H10.5421C5.11127 0.545042 1.57023 3.31942 0.0186875 8.74454C-0.00622917 8.83079 -0.00622917 8.92183 0.0186875 9.00712C1.55298 14.3987 5.09402 17.1539 10.5508 17.1961C15.9951 17.1539 19.5323 14.4179 21.0646 9.06654C21.0896 8.97933 21.0896 8.88733 21.0646 8.80108H21.0637ZM10.5498 16.2377C5.55115 16.1985 2.41835 13.7911 0.977021 8.87679C2.4174 3.996 5.63644 1.5005 10.546 1.45833C15.4153 1.50242 18.6295 4.01708 20.1034 8.93525C18.664 13.8093 15.536 16.1985 10.5498 16.2377Z" fill="#73808B"/>
                                <path d="M2 17.5L19 0.5" stroke="#73808B" stroke-linecap="round"/>
                            </svg>
                        `;
                    }
                });
            }

            form.addEventListener('submit', async function (e) {
                e.preventDefault();

                const email = document.querySelector('input[name="email"]').value.trim();
                const password = document.querySelector('input[name="password"]').value;

                if (!email || !password) {
                    showNotification('Email and password are required!', 'error');
                    return;
                }

                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailPattern.test(email)) {
                    showNotification('Please enter a valid email address!', 'error');
                    return;
                }

                const submitBtn = document.querySelector('.sign-up-button');
                const originalValue = submitBtn.value;
                submitBtn.value = 'Logging in...';
                submitBtn.disabled = true;

                try {
                    console.log('Sending login request...');

                    const response = await fetch(`${BACKEND_URL}/api/auth/login`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            email: email,
                            password: password
                        })
                    });

                    const data = await response.json();
                    console.log('Response:', data);

                    if (!response.ok) {
                        if (data.message === "Ce compte utilise Google. Connectez-vous avec Google.") {
                            throw new Error('This account uses Google Sign-In. Please use Google to log in.');
                        }
                        throw new Error(data.message || 'Login failed');
                    }

                    console.log('Login successful!');

                    localStorage.setItem('token', data.token);
                    console.log('Token saved to localStorage');

                    showNotification('Login successful! Redirecting...', 'success');

                    setTimeout(() => {
                        window.location.href = '../course-informations/course-informations.html';
                    }, 1000);

                } catch (error) {
                    console.error('Login error:', error);
                    showNotification(error.message || 'Failed to log in. Please try again.', 'error');

                    submitBtn.value = originalValue;
                    submitBtn.disabled = false;
                }
            });
        });
    </script>
</body>

</html>
