
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Payment Dashboard</title>
  <link rel="stylesheet" href="admin-dashbord-interface.css">
</head>

<body>
  <div class="dashboard">
    <header class="topbar">
      <div>
        <h1>Admin Dashboard</h1>
        <p>Users from front-end signups with payment status control.</p>
      </div>
      <button type="button" class="toggle-status" id="logoutBtn">Log Out</button>
    </header>

    <section class="panel">
      <div class="panel-header">
        <h2>Students List</h2>
        <div class="search-wrap">
          <label for="searchInput">Search by email</label>
          <input
            type="search"
            id="searchInput"
            placeholder="example@email.com"
            oninput="filterUsers()"
          >
        </div>
      </div>

      <p class="empty-state" id="loadingState">Loading clients...</p>
      <table class="users-table" aria-label="Students and payment status" hidden>
        <thead>
          <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Status</th>
            <th>Change</th>
          </tr>
        </thead>
        <tbody id="usersBody"></tbody>
      </table>
      <p class="empty-state" id="emptyState" hidden>No student found for this email.</p>
    </section>
  </div>

<script src="../Services/env-config.js"></script>
<script>
  let users = [];
  let BACKEND_URL = '';

  let searchValue = '';

  const usersTable = document.querySelector('.users-table');
  const loadingState = document.getElementById('loadingState');
  const logoutBtn = document.getElementById('logoutBtn');

  function getAuthHeaders() {
    const token = localStorage.getItem('token');
    return token ? { Authorization: `Bearer ${token}` } : {};
  }

  function redirectToLogin() {
    window.location.href = 'admin-dashbord-login.html';
  }

  async function api(path, options = {}) {
    const response = await fetch(`${BACKEND_URL}${path}`, {
      ...options,
      headers: {
        'Content-Type': 'application/json',
        ...getAuthHeaders(),
        ...(options.headers || {})
      }
    });

    const data = await response.json().catch(() => ({}));

    if (response.status === 401) {
      localStorage.removeItem('isAdminSignedIn');
      localStorage.removeItem('token');
      throw new Error('Session expired. Please login again.');
    }

    if (!response.ok) {
      throw new Error(data.message || 'Server error.');
    }

    return data;
  }

  function renderUsers() {
    const usersBody = document.getElementById('usersBody');
    const emptyState = document.getElementById('emptyState');
    const filteredUsers = users.filter((user) => (user.email || '').toLowerCase().includes(searchValue.toLowerCase()));

    usersTable.hidden = false;
    loadingState.hidden = true;

    usersBody.innerHTML = filteredUsers.map((user) => `
      <tr>
        <td>${user.username || '-'}</td>
        <td>${user.email}</td>
        <td>
          <span class="status-pill ${user.status ? 'status-payed' : 'status-not-payed'}">
            ${user.status ? 'payed' : 'not payed'}
          </span>
        </td>
        <td>
          <button class="toggle-status" onclick="togglePaymentStatus('${user._id || user.id}')">
            ${user.status ? 'Set not payed' : 'Set payed'}
          </button>
        </td>
      </tr>
    `).join('');

    emptyState.hidden = filteredUsers.length !== 0;
  }

  function filterUsers() {
    searchValue = document.getElementById('searchInput').value;
    renderUsers();
  }

  async function togglePaymentStatus(clientId) {
    const user = users.find((item) => String(item._id || item.id) === String(clientId));
    if (!user) {
      return;
    }

    const nextStatus = !Boolean(user.status);

    try {
      await api(`/api/changestatusclient/${clientId}/validate`, {
        method: 'PUT',
        body: JSON.stringify({ status: nextStatus })
      });

      user.status = nextStatus;
      renderUsers();
    } catch (error) {
      alert(error.message || 'Failed to update status.');
      if (error.message && error.message.toLowerCase().includes('session expired')) {
        redirectToLogin();
      }
    }
  }

  async function loadClients() {
    try {
      await window.ENV_CONFIG.load();
      BACKEND_URL = window.ENV_CONFIG.getApiBaseUrl();

      if (!localStorage.getItem('token')) {
        redirectToLogin();
        return;
      }

      const data = await api('/api/dashboardinformation/clients', { method: 'GET' });
      users = Array.isArray(data.clients) ? data.clients : [];
      renderUsers();
    } catch (error) {
      loadingState.textContent = error.message || 'Failed to load clients.';
      loadingState.hidden = false;
      usersTable.hidden = true;

      if (error.message && error.message.toLowerCase().includes('session expired')) {
        setTimeout(redirectToLogin, 800);
      }
    }
  }

  logoutBtn.addEventListener('click', function () {
    localStorage.removeItem('isAdminSignedIn');
    localStorage.removeItem('adminEmail');
    localStorage.removeItem('token');
    redirectToLogin();
  });

  loadClients();
</script>

</body>

</html>
