<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <meta http-equiv="refresh" content="0; url=/auth-callback.html">
</head>
<body>
    <script>
        // Keep token/error params while routing old callback URL to the canonical one.
        const target = `/auth-callback.html${window.location.search}${window.location.hash}`;
        window.location.replace(target);
    </script>
</body>
</html>
