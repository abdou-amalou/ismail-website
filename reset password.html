<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="reset password.css">
</head>
<body>
    <a href="index.html"><p class = "home"> < home</p></a>
    <div class="everything">
        <div class="circle1"></div>
        <div class="circle2"></div>
        <p class = "header">Create New Password</p>
        <p class = "sub-header">Your new password must be different from previously used passwords</p>
        <form id="reset-password-form">
            <input type="password" name="newPassword" placeholder="New Password" required>
            <input type="password" name="confirmPassword" placeholder="Confirm New Password" required>
            <input id="reset" type="submit" value="Reset Password">
        </form>
    </div>

    <script>
        // ============================================
        // BACKEND URL - CHANGE THIS WHEN YOU GET IT
        // ============================================
        const BACKEND_URL = 'https://smail-app-production.up.railway.app'; // ← PUT YOUR BACKEND URL HERE

        // Handle form submission
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('reset-password-form');
            
            if (!form) {
                console.error('Reset password form not found!');
                return;
            }

            console.log('Reset password form loaded successfully!');

            // Get token from URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            console.log('Token from URL:', token);

            // Check if token exists
            if (!token) {
                alert('Invalid or missing reset token. Please request a new password reset link.');
                window.location.href = 'forget-password.html';
                return;
            }

            // Handle form submission
            form.addEventListener('submit', async function(e) {
                e.preventDefault(); // Prevent page reload

                // Get form values
                const newPassword = document.querySelector('input[name="newPassword"]').value;
                const confirmPassword = document.querySelector('input[name="confirmPassword"]').value;

                // Validation
                if (!newPassword || !confirmPassword) {
                    alert('All fields are required!');
                    return;
                }

                if (newPassword.length < 8) {
                    alert('Password must be at least 8 characters long!');
                    return;
                }

                if (newPassword !== confirmPassword) {
                    alert('Passwords do not match!');
                    return;
                }

                // Show loading state
                const submitBtn = document.getElementById('reset');
                const originalValue = submitBtn.value;
                submitBtn.value = 'Resetting...';
                submitBtn.disabled = true;

                try {
                    console.log('Sending password reset request...');
                    
                    // Send request to backend
                    const response = await fetch(`${BACKEND_URL}/api/auth/reset-password`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            token: token,
                            newPassword: newPassword
                        })
                    });

                    const data = await response.json();
                    console.log('Response:', data);

                    if (!response.ok) {
                        // Handle specific error messages
                        if (data.message === "Token invalide ou expiré.") {
                            throw new Error('Reset link has expired or is invalid. Please request a new one.');
                        }
                        throw new Error(data.message || 'Password reset failed');
                    }

                    // SUCCESS!
                    console.log('Password reset successful!');
                    alert('Password reset successful! Redirecting to login...');
                    
                    // Redirect to login page after 1 second
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1000);

                } catch (error) {
                    // Handle errors
                    console.error('Password reset error:', error);
                    alert(error.message || 'Failed to reset password. Please try again.');
                    
                    // If token is expired, redirect to forgot password page
                    if (error.message.includes('expired') || error.message.includes('invalid')) {
                        setTimeout(() => {
                            window.location.href = 'forget-password.html';
                        }, 2000);
                    }
                    
                    // Reset button
                    submitBtn.value = originalValue;
                    submitBtn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
